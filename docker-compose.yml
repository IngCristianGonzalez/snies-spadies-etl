version: '3.9'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: midb
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: python_app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/midb